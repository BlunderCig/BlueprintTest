blueprint:
  name: "3D Printing Cost & History Tracker"
  description: |
    Track the exact filament and energy cost of each 3D print using Moonraker/Klipper, Spoolman, and any Energy Monitor.
    
    ⚠️ **SETUP REQUIREMENT:** You must setup the Moonraker integration and Spoolman integration (both via HACS) and manually create these helpers via the UI before configuring this:
    1. A 'Local Calendar' integration for your print history.
    2. An `input_number` helper to store the starting energy snapshot.
    3. An `input_number` helper to store the starting spool weight snapshot.
    4. An `input_number` helper to input your energy cost per kwh if you do not have an integration.
  domain: automation
  input:
    # Printer Sensors
    printer_state_sensor:
      name: Printer Current Print State
      description: Select the Current Print State Sensor (not Printer State).
      selector:
        entity:
          domain: sensor
    printer_spool_id_sensor:
      name: Spool ID Sensor
      description: Select the printer's Spool ID Sensor.
      selector:
        entity:
          domain: sensor
    printer_filename_sensor:
      name: Printer Filename Sensor
      description: Select the printer's Filename Sensor.
      selector:
        entity:
          domain: sensor

    # Energy Monitor & Electricity Cost
    energy_monitor:
      name: Energy Monitor
      description: The total accumulated energy sensor (kWh) from your energy monitoring device.
      selector:
        entity:
          domain: sensor
    electricity_cost_entity:
      name: Electricity Cost per kWh
      description: Select either an input_number helper OR a dynamic sensor entity (e.g., utility rate integration).
      selector:
        entity:
          domain:
            - input_number
            - sensor

    # Localization
    currency_symbol:
      name: Currency Symbol
      description: Type the currency symbol you want used in your text log strings (e.g. £, $, €, ¥).
      default: "£"
      selector:
        text:

    # History Storage
    history_calendar:
      name: History Calendar
      description: Select the Local Calendar you created to store your print logs.
      selector:
        entity:
          domain: calendar

    # Handshake Helpers
    helper_start_energy:
      name: Start Energy Helper
      description: The input_number helper used to temporarily snapshot energy.
      selector:
        entity:
          domain: input_number
    helper_start_used_weight:
      name: Start Spool Weight Helper
      description: The input_number helper used to temporarily snapshot spool weight.
      selector:
        entity:
          domain: input_number

mode: restart

trigger:
  - platform: state
    entity_id: !input printer_state_sensor
    to: "printing"
    id: "start"
  - platform: state
    entity_id: !input printer_state_sensor
    from: "printing"
    id: "end"

action:
  # Bring all blueprint inputs into global template scope immediately
  - variables:
      printer_spool_id_sensor: !input printer_spool_id_sensor
      printer_filename_sensor: !input printer_filename_sensor
      energy_monitor: !input energy_monitor
      electricity_cost_entity: !input electricity_cost_entity
      currency_symbol: !input currency_symbol
      helper_start_energy: !input helper_start_energy
      helper_start_used_weight: !input helper_start_used_weight

  - choose:
      # ==========================================
      # SEQUENCE A: PRINT START
      # ==========================================
      - conditions:
          - condition: trigger
            id: "start"
        sequence:
          # Force sync Spoolman to ensure starting weight is 100% fresh
          - action: homeassistant.update_entity
            target:
              entity_id: "sensor.spoolman_spool_{{ states(printer_spool_id_sensor) | int(0) }}_used_weight"
            data: {}
          - delay: "00:00:02"
          
          # Record Start Energy
          - action: input_number.set_value
            target:
              entity_id: !input helper_start_energy
            data:
              value: "{{ states(energy_monitor) | float(0) }}"
              
          # Record Start Spool Weight
          - action: input_number.set_value
            target:
              entity_id: !input helper_start_used_weight
            data:
              value: >-
                {% set spool_id = states(printer_spool_id_sensor) | int(0) %}
                {{ states('sensor.spoolman_spool_' ~ spool_id ~ '_used_weight') | float(0) }}

      # ==========================================
      # SEQUENCE B: PRINT END
      # ==========================================
      - conditions:
          - condition: trigger
            id: "end"
          - condition: template
            value_template: "{{ trigger.to_state.state in ['complete', 'finished'] }}"
        sequence:
          - delay: "00:00:10"
          
          # Force sync Spoolman to get the absolute final printed weight
          - action: homeassistant.update_entity
            target:
              entity_id: "sensor.spoolman_spool_{{ states(printer_spool_id_sensor) | int(0) }}_used_weight"
            data: {}
              
          - variables:
              # --- ENERGY MATH ---
              start_kwh: "{{ states(helper_start_energy) | float(0) }}"
              end_kwh: "{{ states(energy_monitor) | float(0) }}"
              kwh_used: "{{ (end_kwh - start_kwh) | round(3) }}"
              elec_rate: "{{ states(electricity_cost_entity) | float(0.15) }}"
              elec_cost: "{{ (kwh_used * elec_rate) | round(2) }}"
              
              # --- FILAMENT MATH ---
              active_spool_id: "{{ states(printer_spool_id_sensor) | int(0) }}"
              start_weight: "{{ states(helper_start_used_weight) | float(0) }}"
              end_weight: "{{ states('sensor.spoolman_spool_' ~ active_spool_id ~ '_used_weight') | float(0) }}"
              grams_used: "{{ (end_weight - start_weight) | round(1) }}"
              
              # --- TOTAL COST MATH ---
              spool_price: "{{ states('sensor.spoolman_spool_' ~ active_spool_id ~ '_price') | float(0) }}"
              spool_initial_weight: "{{ states('sensor.spoolman_spool_' ~ active_spool_id ~ '_filament_weight') | float(1000) }}"
              cost_per_gram: "{{ spool_price / (spool_initial_weight if spool_initial_weight > 0 else 1000) }}"
              filament_cost: "{{ (grams_used * cost_per_gram) | round(2) }}"
              total_cost: "{{ (elec_cost + filament_cost) | round(2) }}"
              
              print_name: "{{ state_attr(printer_filename_sensor, 'filename') | default('Unknown Print', true) | string }}"

          # Log directly as a calendar event
          - action: calendar.create_event
            target:
              entity_id: !input history_calendar
            data:
              summary: "{{ print_name }} ({{ currency_symbol }}{{ total_cost }})"
              description: >-
                Filament Used: {{ grams_used }}g ({{ currency_symbol }}{{ filament_cost }})
                Power Consumed: {{ kwh_used }} kWh ({{ currency_symbol }}{{ elec_cost }})
                Spool ID Used: #{{ active_spool_id }}
              start_date_time: "{{ now() }}"
              end_date_time: "{{ now() + timedelta(minutes=5) }}"
